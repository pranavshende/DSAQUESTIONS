<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a1a;
    --text-secondary: #666660;
    --text-tertiary: #aaa;
    --text-info: #185fa5;
    --border: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c;
      --bg-secondary: #262626;
      --bg-info: #0c2a44;
      --text-primary: #f0f0ee;
      --text-secondary: #aaa9a3;
      --text-tertiary: #666;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.2);
    }
    .easy { background: #1e3312 !important; color: #97c459 !important; }
    .medium { background: #3d2a08 !important; color: #ef9f27 !important; }
    .hard { background: #3d1010 !important; color: #f09595 !important; }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    padding: 2rem 1.5rem;
    max-width: 860px;
    margin: 0 auto;
    min-height: 100vh;
  }
  .header { margin-bottom: 1.75rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .header p { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
  .topic-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .tab {
    font-size: 12px; padding: 5px 13px;
    border-radius: 20px;
    border: 0.5px solid var(--border-secondary);
    cursor: pointer;
    background: var(--bg);
    color: var(--text-secondary);
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { background: var(--bg-secondary); }
  .tab.active {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: transparent;
    font-weight: 500;
  }
  .topic-info {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    padding: 8px 13px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
  }
  .topic-info b { color: var(--text-primary); font-weight: 500; }
  .questions-grid { display: grid; gap: 6px; }
  .q-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.1s;
  }
  .q-item:hover { background: var(--bg-secondary); }
  .q-num { font-size: 12px; color: var(--text-tertiary); min-width: 24px; font-weight: 500; }
  .q-title { font-size: 13px; color: var(--text-primary); flex: 1; }
  .diff { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .easy { background: #EAF3DE; color: #3B6D11; }
  .medium { background: #FAEEDA; color: #854F0B; }
  .hard { background: #FCEBEB; color: #A32D2D; }
  footer { margin-top: 2rem; font-size: 11px; color: var(--text-tertiary); text-align: center; }
</style>

let active = topicKeys[0];

function diffClass(d) { return d === "Easy" ? "easy" : d === "Medium" ? "medium" : "hard"; }

function toSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
}

function render() {
  document.getElementById("tabs").innerHTML = topicKeys.map(t =>
    `<div class="tab${t===active?' active':''}" onclick="setTopic('${t}')">${t}</div>`
  ).join('');

  const qs = topics[active].questions;
  const easy = qs.filter(q=>q[1]==="Easy").length;
  const med = qs.filter(q=>q[1]==="Medium").length;
  const hard = qs.filter(q=>q[1]==="Hard").length;

  document.getElementById("topic-info").innerHTML =
    `<b>${active}</b> — ${easy} Easy &nbsp;·&nbsp; ${med} Medium &nbsp;·&nbsp; ${hard} Hard`;

  document.getElementById("qlist").innerHTML = qs.map((q,i) =>
    `<a class="q-item" href="https://leetcode.com/problems/${toSlug(q[0])}/" target="_blank">
      <span class="q-num">${i+1}</span>
      <span class="q-title">${q[0]}</span>
      <span class="diff ${diffClass(q[1])}">${q[1]}</span>
    </a>`
  ).join('');
}

function setTopic(t) { active = t; render(); }
